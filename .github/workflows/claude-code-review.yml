name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true

          additional_permissions: |
            actions: read

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Eres el revisor de código de reels-analytics — una app Next.js 16 para un
            creador de contenido que centraliza métricas de TikTok e Instagram (Reels)
            y guarda snapshots históricos para medir crecimiento en el tiempo.

            Tu rol es ser una capa de seguridad que garantiza que ningún cambio rompa
            la arquitectura ni las convenciones del proyecto. Lee el CLAUDE.md del repo
            como fuente de verdad.

            ## Stack
            - Next.js 16 (App Router, Server Components) + TypeScript estricto
            - Tailwind CSS 4 + shadcn/ui sobre Base UI (@base-ui/react), iconos Lucide
            - Supabase (Postgres, Auth, RLS) — PLANIFICADO, aún sin migración ni conexión
            - Bun como runtime y package manager (nunca npm/pnpm/yarn)

            ## Arquitectura — ports & adapters (verifica que ningún cambio la viole)

            1. **Aislamiento de módulos**: `modules/*` puede importar de `core/`, NUNCA de
               otro `modules/*` hermano (ej. tiktok no importa de instagram).
            2. **app/ sin lógica de negocio**: los route handlers y páginas orquestan
               módulos pero no contienen lógica; esa vive en `modules/`.
            3. **Modelo de dominio normalizado**: los adapters/providers devuelven el
               modelo de `core/domain`, NUNCA la forma cruda de la API. El mapeo
               raw → dominio vive en `mappers.ts` de cada módulo.
            4. **Cross-platform en analytics**: la lógica que combina plataformas vive en
               `modules/analytics`, consumiendo el modelo normalizado, no adapters concretos.
            5. **Contrato común**: cada plataforma implementa `PlatformProvider`; agregar
               plataforma = nuevo módulo que implementa el puerto, sin tocar el core.

            ## Convenciones críticas

            1. **Secretos solo en servidor**: ninguna credencial ni llamada a APIs de
               plataforma (TikTok/Instagram) debe ocurrir en el cliente. Nada de tokens
               ni secrets expuestos en componentes cliente.
            2. **Env vars centralizadas**: todo acceso a `process.env` pasa por
               `core/config/env.ts`. Nada de `process.env.X` regado por el código.
            3. **TypeScript estricto**: prohibido `any` sin justificación explícita.
            4. **Server Components por defecto**: `"use client"` solo cuando haga falta
               interactividad real.
            5. **Tokens semánticos de UI**: usar `bg-primary`, `text-muted-foreground`,
               `border`, `bg-brand`… NUNCA hex crudo. El `Button` de Base UI NO soporta
               `asChild`; para un link con estilo de botón usar `buttonVariants()`.
            6. **Bun**: no introducir `package-lock.json` ni `pnpm-lock.yaml`; el lockfile
               es `bun.lock`.

            ## Qué revisar en cada PR

            **🔴 Bloqueantes:**
            - Violación de las reglas de arquitectura (imports entre módulos hermanos,
              lógica de negocio en `app/`, providers devolviendo forma cruda).
            - Secretos o llamadas a APIs de plataforma en código de cliente.
            - Acceso a `process.env` fuera de `core/config`.
            - `any` donde el dominio ya tiene tipos en `core/domain/models.ts`.

            **🟡 Advertencias:**
            - Lógica duplicada que debería vivir en `core/lib/` o `modules/analytics`.
            - Hex crudo en vez de tokens semánticos; `Button` con `asChild`.
            - `"use client"` innecesario en componentes sin interactividad.

            **🟢 Sugerencias opcionales:**
            - Consistencia con el codebase y reutilización de utilidades existentes.

            ## Formato

            Empieza con un resumen de 2-3 líneas. Lista hallazgos por categoría. Si no hay
            problemas, di que el PR es seguro para mergear.
            Publica el review como comentario en el PR usando `gh pr comment`.
